<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle"><circle cx="50" cy="50" r="50"/></clipPath>
    <clipPath id="leftHalf"><rect x="0" y="0" width="50" height="100"/></clipPath>
    <clipPath id="rightHalf"><rect x="50" y="0" width="50" height="100"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Left: EU flag -->
    <g clip-path="url(#leftHalf)">
      <rect width="100" height="100" fill="#003399"/>
      <g fill="#FFCC00">
        <!-- 12 stars in circle, radius 30, center 50,50 -->
        <g id="stars">
          <!-- approximated 5-pointed stars as small circles for simplicity at icon size -->
        </g>
        <!-- Use circles as star placeholders -->
        <circle cx="50" cy="20" r="3"/>
        <circle cx="65" cy="24" r="3"/>
        <circle cx="76" cy="35" r="3"/>
        <circle cx="80" cy="50" r="3"/>
        <circle cx="76" cy="65" r="3"/>
        <circle cx="65" cy="76" r="3"/>
        <circle cx="50" cy="80" r="3"/>
        <circle cx="35" cy="76" r="3"/>
        <circle cx="24" cy="65" r="3"/>
        <circle cx="20" cy="50" r="3"/>
        <circle cx="24" cy="35" r="3"/>
        <circle cx="35" cy="24" r="3"/>
      </g>
    </g>
    <!-- Right: Union Jack -->
    <g clip-path="url(#rightHalf)">
      <rect width="100" height="100" fill="#012169"/>
      <!-- White diagonals -->
      <path d="M0,0 L100,100 M100,0 L0,100" stroke="#FFFFFF" stroke-width="20"/>
      <!-- Red diagonals (St Patrick) -->
      <path d="M0,0 L100,100 M100,0 L0,100" stroke="#C8102E" stroke-width="8"/>
      <!-- White cross -->
      <path d="M50,0 V100 M0,50 H100" stroke="#FFFFFF" stroke-width="28"/>
      <!-- Red cross (St George) -->
      <path d="M50,0 V100 M0,50 H100" stroke="#C8102E" stroke-width="14"/>
    </g>
    <!-- Divider -->
    <line x1="50" y1="0" x2="50" y2="100" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="49" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
  </g>
</svg>
