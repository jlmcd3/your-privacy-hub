<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" preserveAspectRatio="xMidYMid meet">
  <!-- 1:1 aspect ratio, optimized for circular clip at small sizes -->
  <defs>
    <clipPath id="circle"><circle cx="20" cy="20" r="20"/></clipPath>
    <clipPath id="leftHalf"><rect x="0" y="0" width="20" height="40"/></clipPath>
    <clipPath id="rightHalf"><rect x="20" y="0" width="20" height="40"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <!-- Left: EU flag -->
    <g clip-path="url(#leftHalf)">
      <rect width="40" height="40" fill="#003399"/>
      <!-- 12 stars in circle - optimized for small size -->
      <g fill="#FFCC00">
        <circle cx="20" cy="8" r="1.5"/>
        <circle cx="26" cy="9.6" r="1.5"/>
        <circle cx="30.4" cy="14" r="1.5"/>
        <circle cx="32" cy="20" r="1.5"/>
        <circle cx="30.4" cy="26" r="1.5"/>
        <circle cx="26" cy="30.4" r="1.5"/>
        <circle cx="20" cy="32" r="1.5"/>
        <circle cx="14" cy="30.4" r="1.5"/>
        <circle cx="9.6" cy="26" r="1.5"/>
        <circle cx="8" cy="20" r="1.5"/>
        <circle cx="9.6" cy="14" r="1.5"/>
        <circle cx="14" cy="9.6" r="1.5"/>
      </g>
    </g>
    <!-- Right: Union Jack - simplified for small size -->
    <g clip-path="url(#rightHalf)">
      <rect width="40" height="40" fill="#012169"/>
      <!-- White diagonals -->
      <path d="M20,0 L40,40 M40,0 L20,40" stroke="#FFFFFF" stroke-width="6"/>
      <!-- Red diagonals (St Patrick) -->
      <path d="M20,0 L40,40 M40,0 L20,40" stroke="#C8102E" stroke-width="2"/>
      <!-- White cross -->
      <path d="M30,0 V40 M20,20 H40" stroke="#FFFFFF" stroke-width="10"/>
      <!-- Red cross (St George) -->
      <path d="M30,0 V40 M20,20 H40" stroke="#C8102E" stroke-width="5"/>
    </g>
    <!-- Subtle divider line -->
    <line x1="20" y1="0" x2="20" y2="40" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>
    <!-- Outer ring for definition -->
    <circle cx="20" cy="20" r="19.5" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  </g>
</svg>